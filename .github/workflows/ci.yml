name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check
      - run: make test
      - run: go vet ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate tag against VERSION
        run: make release-tag-check TAG="${GITHUB_REF_NAME}"
      - run: make dist
      - run: cd dist && sha256sum aipack-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/aipack-*
            dist/SHA256SUMS

  update-homebrew-tap:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Derive release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Fetch published checksums
        id: checksums
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"

          curl -fsSL --retry 5 --output SHA256SUMS \
            "https://github.com/shrug-labs/aipack/releases/download/${TAG}/SHA256SUMS"

          darwin_arm64_sha=$(awk '$2 == "aipack-darwin-arm64" { print $1 }' SHA256SUMS)
          darwin_amd64_sha=$(awk '$2 == "aipack-darwin-amd64" { print $1 }' SHA256SUMS)
          linux_amd64_sha=$(awk '$2 == "aipack-linux-amd64" { print $1 }' SHA256SUMS)

          if [ -z "${darwin_arm64_sha}" ] || [ -z "${darwin_amd64_sha}" ] || [ -z "${linux_amd64_sha}" ]; then
            echo "Failed to resolve release checksums for ${VERSION}" >&2
            cat SHA256SUMS >&2
            exit 1
          fi

          echo "darwin_arm64_sha=${darwin_arm64_sha}" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64_sha=${darwin_amd64_sha}" >> "$GITHUB_OUTPUT"
          echo "linux_amd64_sha=${linux_amd64_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: dfoster-oracle/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update aipack formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          DARWIN_ARM64_SHA: ${{ steps.checksums.outputs.darwin_arm64_sha }}
          DARWIN_AMD64_SHA: ${{ steps.checksums.outputs.darwin_amd64_sha }}
          LINUX_AMD64_SHA: ${{ steps.checksums.outputs.linux_amd64_sha }}
        run: |
          set -euo pipefail
          FORMULA_PATH="tap/Formula/aipack.rb"
          export FORMULA_PATH

          ruby <<'RUBY'
          formula_path = ENV.fetch("FORMULA_PATH")
          version = ENV.fetch("VERSION")
          darwin_arm64_sha = ENV.fetch("DARWIN_ARM64_SHA")
          darwin_amd64_sha = ENV.fetch("DARWIN_AMD64_SHA")
          linux_amd64_sha = ENV.fetch("LINUX_AMD64_SHA")

          content = File.read(formula_path)
          updated = content.dup

          version_pattern = /^  version ".*"$/
          raise "Formula version line not found" unless updated.match?(version_pattern)
          updated.sub!(version_pattern, "  version \"#{version}\"")

          sha_rules = [
            [%r{(aipack-darwin-arm64"\n\s+sha256 ")([^"]+)(")}, darwin_arm64_sha, "darwin arm64"],
            [%r{(aipack-darwin-amd64"\n\s+sha256 ")([^"]+)(")}, darwin_amd64_sha, "darwin amd64"],
            [%r{(aipack-linux-amd64"\n\s+sha256 ")([^"]+)(")}, linux_amd64_sha, "linux amd64"]
          ]

          sha_rules.each do |pattern, checksum, label|
            replaced = updated.sub!(pattern, "\\1#{checksum}\\3")
            raise "Could not update #{label} sha256 in formula" if replaced.nil?
          end

          File.write(formula_path, updated) if updated != content
          RUBY

      - name: Commit and push formula update
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula/aipack.rb; then
            echo "No formula update needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/aipack.rb
          git commit -m "aipack ${VERSION}"
          git push origin HEAD:main
